<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Little Achievers Early Childhood Development Centre</title>
  <style>
    html { scroll-behavior: smooth; }
    body {
      font-family: Arial, sans-serif;
      margin: 0; padding: 0;
      background-color: #ffffff; color: #333333;
      transition: background-color 0.3s, color 0.3s;
    }
    header {
      background-color: #f0f8f5; color: #2e8b57;
      padding: 20px 0; text-align: center;
      border-bottom: 2px solid #2e8b57;
    }
    nav {
      background-color: #ffffff; border-bottom: 1px solid #ddd;
      display: flex; justify-content: center;
      padding: 10px 0; position: sticky; top: 0; z-index: 1000;
    }
    nav a {
      color: #2e8b57; text-decoration: none;
      margin: 0 15px; font-weight: bold;
      transition: color 0.3s;
    }
    nav a.active { color: #ffd700; text-decoration: underline; }
    h1 { margin: 0; font-size: 28px; }
    h2 { color: #2e8b57; text-align: center; }
    section { padding: 60px 20px; text-align: center; }
    .contact-info, .programs {
      background-color: #f9f9f9; border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: inline-block; padding: 20px; margin-top: 10px;
      text-align: left; max-width: 600px;
      transition: background-color 0.3s, color 0.3s;
    }
    .programs h3 { color: #2e8b57; margin-bottom: 5px; }
    footer {
      background-color: #f0f8f5; color: #2e8b57;
      padding: 10px 0; font-size: 14px; text-align: center;
      border-top: 2px solid #2e8b57;
      transition: background-color 0.3s, color 0.3s;
    }
    a { color: #2e8b57; text-decoration: none; }

    /* Contact buttons */
    .contact-buttons {
      display: flex; gap: 15px; margin-top: 15px;
    }
    .contact-button {
      display: inline-block; padding: 10px 20px;
      border-radius: 5px; text-decoration: none;
      font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      transition: background-color 0.3s;
    }
    .phone-button { background-color: #ffd700; color: #333; }
    .phone-button:hover { background-color: #e6c200; }
    .email-button { background-color: #2e8b57; color: white; }
    .email-button:hover { background-color: #1f5c3c; }

    /* Back to Top button */
    #backToTop {
      display: none; position: fixed; bottom: 30px; right: 30px;
      background-color: #2e8b57; color: white; border: none;
      padding: 10px 15px; border-radius: 5px; cursor: pointer;
      font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
      transition: opacity 0.3s;
    }
    #backToTop:hover { background-color: #1f5c3c; }

    /* Theme toggle button */
    #themeToggle {
      position: fixed; top: 20px; right: 20px;
      background-color: #2e8b57; color: white; border: none;
      padding: 8px 12px; border-radius: 5px; cursor: pointer;
      font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }
    #themeToggle:hover { background-color: #1f5c3c; }

    /* Dark theme styles */
    body.dark { background-color: #1e1e1e; color: #f0f0f0; }
    body.dark header { background-color: #2e8b57; color: #ffffff; border-bottom: 2px solid #ffd700; }
    body.dark nav { background-color: #2e2e2e; border-bottom: 1px solid #444; }
